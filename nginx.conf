# Nginx — маршрутизация трафика
# /app   → Mini App (React)
# /api   → FastAPI бэкенд
# /bot   → Telegram-бот (webhook)

server {
    listen 80;
    server_name _;

    # Mini App (React frontend)
    location /app {
        proxy_pass http://webapp:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # FastAPI бэкенд
    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram-бот (webhook режим)
    location /bot {
        proxy_pass http://bot:8000;
        proxy_set_header Host $host;
    }

    # По умолчанию — редирект на Mini App
    location / {
        return 302 /app;
    }
}
