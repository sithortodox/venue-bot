# Docker Compose — полный стек приложения
# Сервисы: PostgreSQL, Redis, FastAPI, Telegram-бот, Mini App, Nginx

version: "3.8"

services:
  # === База данных PostgreSQL ===
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: venue
      POSTGRES_PASSWORD: venue_secret
      POSTGRES_DB: venue_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venue -d venue_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Redis (кэш, сессии) ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === FastAPI бэкенд ===
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app/api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # === Telegram-бот (aiogram) ===
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./bot:/app/bot
    command: python -m bot.main

  # === Mini App (React + Vite) ===
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      target: webapp
    ports:
      - "3000:3000"
    volumes:
      - ./webapp:/app/webapp
      - /app/webapp/node_modules
    command: npm run dev -- --host 0.0.0.0

  # === Nginx (маршрутизация) ===
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - bot
      - webapp

# Том для данных PostgreSQL
volumes:
  pgdata:
